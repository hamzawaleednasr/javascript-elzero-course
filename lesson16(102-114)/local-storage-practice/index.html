<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 50px;
      background-color: #eeeeee;
      margin: 50px auto;
    }
    ul {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 30px;
      background-color: #dddddd;
      padding: 15px;

      list-style: none;
      margin: 0;
    }
    ul li {
      width: 80px;
      height: 80px;
      opacity: 0.4;
      transition-duration: 0.2s;
      cursor: pointer;
    }
    ul li:hover {
      opacity: 1 !important;
    }
    ul li.red {
      background-color: red;
      opacity: 1;
    }
    ul li.green {
      background-color: green;
    }
    ul li.blue {
      background-color: blue;
    }
    ul li.gray {
      background-color: gray;
    }

    .box {
      width: calc(100% - 400px);
      height: 300px;
      background-color: red;
    }
  </style>
  <body>
    <ul class="colors-list">
      <li class="red"></li>
      <li class="green"></li>
      <li class="blue"></li>
      <li class="gray"></li>
    </ul>

    <div class="box"></div>

    <script src="main.js"></script>
  </body>
</html>
