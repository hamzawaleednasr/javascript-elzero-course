<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }
    .container {
      margin: 10px auto;
      display: flex;
      align-items: center;
      flex-direction: column;
      gap: 20px;
      width: fit-content;
      min-width: 80%;
    }
    .form {
      display: flex;
      align-items: center;
      gap: 10px;
      background-color: #eeeeee;
      padding: 15px;
      width: 100%;
      border-radius: 4px;
    }
    .tasks {
      background-color: #eeeeee;
      padding: 15px;
      width: 100%;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .input {
      border: none;
      padding: 8px;
      border-radius: 4px;
      flex: 1;
    }
    .input:focus {
      outline: none;
    }
    .add {
      border: none;
      background-color: #ff5333;
      color: white;
      border-radius: 4px;
      padding: 8px;
      cursor: pointer;
    }
    .task {
      background-color: white;
      border-radius: 4px;
      padding: 15px;
      display: flex;
      align-items: center;
    }
    .task .name {
      flex: 1;
      margin: 0;
    }
    .task .delete {
      border: none;
      background-color: #ff5333;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
  <body>
    <div class="container">
      <div class="form">
        <input type="text" class="input" id="taskname" />
        <input type="submit" class="add" value="Add Task" />
      </div>
      <div class="tasks"></div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
